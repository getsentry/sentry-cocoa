name: Assemble SentryObjC Static XCFramework

on:
  workflow_call:
    inputs:
      signed:
        description: |-
          Whether the assembled XCFramework should be signed.
        required: false
        type: boolean
        default: false

      sdks:
        description: |-
          Comma-separated list of SDKs whose slices to assemble.
        required: false
        type: string
        default: "iphoneos,iphonesimulator,macosx,maccatalyst,appletvos,appletvsimulator,watchos,watchsimulator,xros,xrsimulator"

      release-version:
        description: |-
          For release workflows, the version to inject into the SDK.
        required: false
        type: string

jobs:
  assemble-sentryobjc-static-xcframework:
    name: SentryObjC-Static
    runs-on: macos-26

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: "26"

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        if: ${{ inputs.signed }}
        with:
          bundler-cache: true

      - name: Download Fastlane Certificate
        if: ${{ inputs.signed }}
        run: bundle exec fastlane prepare_xcframework_signing
        env:
          FASTLANE_KEYCHAIN_PASSWORD: ${{ secrets.FASTLANE_KEYCHAIN_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_USERNAME: ${{ secrets.MATCH_USERNAME }}

      - name: Download all SentryObjC slices
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sentryobjc-slice-*
          path: sentryobjc-slices

      - name: Arrange slices
        env:
          SDKS: ${{ inputs.sdks }}
        run: |
          IFS=',' read -r -a sdk_list <<< "$SDKS"
          for sdk in "${sdk_list[@]}"; do
            mkdir -p "XCFrameworkBuildPath/lib/SentryObjC/$sdk"
            cp "sentryobjc-slices/sentryobjc-slice-$sdk/libSentryObjC.a" \
              "XCFrameworkBuildPath/lib/SentryObjC/$sdk/libSentryObjC.a"
          done

      - name: Assemble XCFramework
        env:
          SDKS: ${{ inputs.sdks }}
        run: |
          ./scripts/assemble-xcframework-sentryobjc.sh \
            --sdks "$SDKS" \
            --lib-path-template "XCFrameworkBuildPath/lib/SentryObjC/SDK_NAME/libSentryObjC.a" \
            --headers "Sources/SentryObjC/Public" \
            --output-name "SentryObjC-Static"

      - name: Validate XCFramework
        run: |
          ./scripts/validate-xcframework.sh --xcframework "SentryObjC-Static.xcframework"

      - name: Compress XCFramework
        env:
          SIGNED: ${{ inputs.signed }}
        run: |
          if [ "$SIGNED" = "true" ]; then
            ./scripts/compress-xcframework.sh --xcframework "SentryObjC-Static.xcframework" --sign
          else
            ./scripts/compress-xcframework.sh --xcframework "SentryObjC-Static.xcframework"
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          overwrite: true
          name: xcframework-${{ github.sha }}-sentryobjc-static
          if-no-files-found: error
          path: SentryObjC-Static.xcframework.zip

      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: failure()
