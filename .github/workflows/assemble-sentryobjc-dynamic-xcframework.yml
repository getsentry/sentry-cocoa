name: Assemble SentryObjC Dynamic XCFramework

on:
  workflow_call:
    inputs:
      signed:
        description: |-
          Whether the assembled XCFramework should be signed.
        required: false
        type: boolean
        default: false

      sdks:
        description: |-
          Comma-separated list of SDKs whose slices to assemble.
        required: false
        type: string
        default: "iphoneos,iphonesimulator,macosx,maccatalyst,appletvos,appletvsimulator,watchos,watchsimulator,xros,xrsimulator"

      release-version:
        description: |-
          For release workflows, the version to inject into the SDK.
        required: false
        type: string

jobs:
  assemble-sentryobjc-dynamic-xcframework:
    name: SentryObjC-Dynamic
    runs-on: macos-26

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: "26"

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        if: ${{ inputs.signed }}
        with:
          bundler-cache: true

      - name: Download Fastlane Certificate
        if: ${{ inputs.signed }}
        run: bundle exec fastlane prepare_xcframework_signing
        env:
          FASTLANE_KEYCHAIN_PASSWORD: ${{ secrets.FASTLANE_KEYCHAIN_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_USERNAME: ${{ secrets.MATCH_USERNAME }}

      # Dynamic framework slices (with dSYMs) are built in the static slice
      # job so that dsymutil runs while the .o files from xcodebuild archive
      # are still on disk.
      - name: Download all SentryObjC dynamic framework slices
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sentryobjc-dynamic-slice-*
          path: sentryobjc-dynamic-slices

      - name: Extract dynamic framework slices
        env:
          SDKS: ${{ inputs.sdks }}
        run: |
          IFS=',' read -r -a sdk_list <<< "$SDKS"
          for sdk in "${sdk_list[@]}"; do
            tar -xzf "sentryobjc-dynamic-slices/sentryobjc-dynamic-slice-$sdk/sentryobjc-dynamic-$sdk.tar.gz" \
              -C "sentryobjc-dynamic-slices/sentryobjc-dynamic-slice-$sdk"
          done

      - name: Assemble XCFramework
        env:
          SDKS: ${{ inputs.sdks }}
        run: |
          ./scripts/assemble-xcframework-sentryobjc.sh \
            --sdks "$SDKS" \
            --framework-path-template "sentryobjc-dynamic-slices/sentryobjc-dynamic-slice-SDK_NAME/SentryObjC.framework" \
            --output-name "SentryObjC-Dynamic"

      - name: Validate XCFramework
        run: |
          ./scripts/validate-xcframework-format.sh "SentryObjC-Dynamic.xcframework"
          ./scripts/validate-xcframework-architectures.sh --xcframework "SentryObjC-Dynamic.xcframework"

      - name: Compress XCFramework
        env:
          SIGNED: ${{ inputs.signed }}
        run: |
          if [ "$SIGNED" = "true" ]; then
            ./scripts/compress-xcframework.sh --sign "SentryObjC-Dynamic"
          else
            ./scripts/compress-xcframework.sh --not-signed "SentryObjC-Dynamic"
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          overwrite: true
          name: xcframework-${{ github.sha }}-sentryobjc-dynamic
          if-no-files-found: error
          path: SentryObjC-Dynamic.xcframework.zip

      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: failure()
