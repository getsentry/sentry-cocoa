name: Unit Test Common

on:
  workflow_call:
    inputs:
      name:
        description: a descriptive job name
        required: true
        type: string

      runs-on:
        description: the runner to use for the job
        required: true
        type: string

      timeout:
        description: the timeout for the job
        required: true
        default: 20
        type: number

      should_skip:
        description: whether to skip the job
        required: false
        default: false
        type: boolean

      runner_provider:
        description: "CI runner provider: cirrus (default) or bitrise"
        required: false
        default: "cirrus"
        type: string

      xcode:
        description: the Xcode version to use for the job
        required: true
        type: string

      test-destination-os:
        description: >-
          Simulator OS version to test against. Leave empty to use the default
          for the selected Xcode (derived from its SDK by setup-xcode).
        required: false
        default: ""
        type: string

      platform:
        description: the platform to test on
        required: true
        type: string

      device:
        description: the device to test on
        required: false
        default: ""
        type: string

      scheme:
        description: the scheme to test
        required: true
        type: string

jobs:
  unit-tests:
    name: Unit ${{inputs.name}}
    runs-on: ${{ inputs.runner_provider == 'bitrise' && fromJSON(format('["bitrise_pool_name:{0}"]', inputs.runs-on)) || fromJSON(format('["ghcr.io/cirruslabs/macos-runner:{0},runner_concurrency_group={1}", "runner_group_id:10"]', inputs.runs-on, github.run_id)) }}
    timeout-minutes: ${{inputs.timeout}}
    if: ${{!inputs.should_skip}}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Xcode
        id: setup-xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: ${{ inputs.xcode }}

      - name: Install simulator runtime
        # Bitrise is missing tvOS 17.5 runtime, so we need to install it manually.
        if: ${{ inputs.runner_provider == 'bitrise' && inputs.test-destination-os != '' && inputs.platform == 'tvOS' }}
        timeout-minutes: 5
        env:
          OS_VERSION: ${{ inputs.test-destination-os }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          if xcrun simctl list runtimes -j 2>/dev/null \
              | jq -e --arg p "$PLATFORM" --arg v "$OS_VERSION" \
                  '[.runtimes[] | select(.isAvailable == true) | select(.platform == $p) | select(.version == $v)] | length > 0' \
                  > /dev/null 2>&1; then
            echo "Runtime $PLATFORM $OS_VERSION is already installed"
          else
            echo "Installing $PLATFORM $OS_VERSION runtime..."
            xcodebuild -downloadPlatform "$PLATFORM" -buildVersion "$OS_VERSION"
          fi

      - name: Resolve test destination
        id: resolve-test-destination
        uses: ./.github/actions/resolve-test-destination
        with:
          test-destination-os: ${{ inputs.test-destination-os }}
          device: ${{ inputs.device }}
          platform: ${{ inputs.platform }}

      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        name: Cache Ruby
        with:
          path: |
            ~/.rbenv/versions
            ~/.rbenv/cache
          key: ruby-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.ruby-version') }}

      - name: Install Ruby (Bitrise)
        if: inputs.runner_provider == 'bitrise'
        run: |
          brew upgrade ruby-build
          rbenv install -s
          bundle install

      - name: Setup Ruby
        if: inputs.runner_provider != 'bitrise'
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          bundler-cache: true

      - name: Ensure required runtime is loaded
        if: ${{ inputs.platform == 'iOS' || inputs.platform == 'tvOS' || inputs.platform == 'visionOS' }}
        # Ideally we will not need this, but CI sometimes is failing to load some runtimes, this will ensure they are loaded
        timeout-minutes: 5 # 5 minutes timeout
        env:
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
          PLATFORM: ${{ inputs.platform }}
        run: ./scripts/ci-ensure-runtime-loaded.sh --os-version "$OS_VERSION" --platform "$PLATFORM"

      # Boot created simulators to ensure they're ready before tests run
      # Based on CircleCI forum comment, booting is especially important for Xcode 26: https://discuss.circleci.com/t/xcode-26-rc/54066/18
      - name: Boot simulator
        if: ${{ inputs.platform == 'iOS' || inputs.platform == 'visionOS' }}
        env:
          XCODE_VERSION: ${{ inputs.xcode }}
          DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
          PLATFORM: ${{ inputs.platform }}
        run: ./scripts/ci-boot-simulator.sh --xcode "$XCODE_VERSION" --device "$DEVICE_NAME" --os-version "$OS_VERSION" --platform "$PLATFORM"

      # We split building and running tests in two steps so we know how long running the tests takes.
      - name: Build Tests
        id: build_tests
        env:
          PLATFORM: ${{ inputs.platform }}
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
          REF_NAME: ${{ github.ref_name }}
          DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          ./scripts/sentry-xcodebuild.sh \
            --platform "$PLATFORM" \
            --os "$OS_VERSION" \
            --ref "$REF_NAME" \
            --command build-for-testing \
            --device "$DEVICE_NAME" \
            --configuration TestCI \
            --scheme "$SCHEME"

      - name: Collect SentryTests Metadata
        id: collect_sentrytests_metadata
        if: ${{ steps.build_tests.outcome == 'success' && inputs.scheme == 'Sentry' }}
        continue-on-error: true
        run: |
          ./scripts/ci-collect-sentrytests-metadata.sh \
            --derived-data-root "$HOME/Library/Developer/Xcode/DerivedData" \
            --output-dir sentrytests-metadata

      # Run Flaky Tests TestPlan which has a retry mechanism on failure.
      # We intentionally run these before the other test plan to fail early.
      # Use a separate result bundle name to avoid conflicts with the regular test run.
      # xcodebuild fails if a result bundle already exists at the target path.
      - name: Run Flaky Tests
        id: run_flaky_tests
        # Only the Sentry Scheme has the Flaky TestPlan.
        if: ${{ inputs.scheme == 'Sentry' }}
        env:
          PLATFORM: ${{ inputs.platform }}
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
          REF_NAME: ${{ github.ref_name }}
          DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          ./scripts/sentry-xcodebuild.sh \
            --platform "$PLATFORM" \
            --os "$OS_VERSION" \
            --ref "$REF_NAME" \
            --command test-without-building \
            --device "$DEVICE_NAME" \
            --configuration TestCI \
            --scheme "$SCHEME" \
            --test-plan Sentry_Flaky \
            --result-bundle flaky-results.xcresult

      - name: Run tests
        id: run_tests
        # We call a script with the platform so the destination
        # passed to xcodebuild doesn't end up in the job name,
        # because GitHub Actions don't provide an easy way of
        # manipulating string in expressions.
        env:
          PLATFORM: ${{ inputs.platform }}
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
          REF_NAME: ${{ github.ref_name }}
          DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
          SCHEME: ${{ inputs.scheme }}
          TEST_RUNNER_GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/sentry-xcodebuild.sh \
            --platform "$PLATFORM" \
            --os "$OS_VERSION" \
            --ref "$REF_NAME" \
            --command test-without-building \
            --device "$DEVICE_NAME" \
            --configuration TestCI \
            --scheme "$SCHEME" \
            --result-bundle results.xcresult

      - name: Publish Test Report
        id: publish_test_report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: ${{ always() && (steps.run_tests.outcome == 'failure' || steps.run_flaky_tests.outcome == 'failure') }}
        with:
          report_paths: "build/reports/junit.xml"
          fail_on_failure: true
          fail_on_parse_error: true
          detailed_summary: true

      # When a test crashes, xcbeautify may not report the failure in the junit.xml,
      # so the test step fails but Publish Test Report finds no failures. In that case,
      # extract failure info from the raw xcodebuild log.
      - name: Analyze raw test output for crashes
        if: ${{ always() && steps.publish_test_report.outcome == 'success' && (steps.run_tests.outcome == 'failure' || steps.run_flaky_tests.outcome == 'failure') }}
        run: |
          echo "::warning::Tests failed but no failures were found in the test report. This usually indicates a test crashed without proper reporting to xcbeautify."
          echo ""
          if [ -f raw-test-output.log ]; then
            if grep -q "Failing tests:" raw-test-output.log; then
              echo "=== Failing tests from raw output ==="
              sed -n '/Failing tests:/,/^$/p' raw-test-output.log
            fi
          else
            echo "raw-test-output.log not found."
          fi

      - name: Archiving DerivedData Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: steps.build_tests.outcome == 'failure'
        with:
          name: derived-data-${{ inputs.runner_provider }}-${{inputs.platform}}-xcode-${{inputs.xcode}}-os-${{steps.resolve-test-destination.outputs.TEST_OS}}
          path: |
            /Users/runner/Library/Developer/Xcode/DerivedData/**/Logs/**

      - name: Archiving Raw Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: raw-output-${{ inputs.runner_provider }}-${{inputs.platform}}-xcode-${{inputs.xcode}}-os-${{steps.resolve-test-destination.outputs.TEST_OS}}
          path: |
            raw-build-output.log
            raw-build-for-testing-output.log
            raw-test-output.log

      - name: Archiving Crash Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: crash-logs-${{ inputs.runner_provider }}-${{inputs.platform}}-xcode-${{inputs.xcode}}-os-${{steps.resolve-test-destination.outputs.TEST_OS}}
          path: |
            ~/Library/Logs/DiagnosticReports/**

      - name: Archiving Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: result-bundle-${{ inputs.runner_provider }}-${{inputs.platform}}-xcode-${{inputs.xcode}}-os-${{steps.resolve-test-destination.outputs.TEST_OS}}
          path: |
            results.xcresult
            flaky-results.xcresult

      - name: Archiving SentryTests Metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ (failure() || cancelled()) && inputs.scheme == 'Sentry' && steps.collect_sentrytests_metadata.outcome == 'success' }}
        with:
          name: sentrytests-metadata-${{ inputs.runner_provider }}-${{inputs.platform}}-xcode-${{inputs.xcode}}-os-${{steps.resolve-test-destination.outputs.TEST_OS}}
          if-no-files-found: error
          path: |
            sentrytests-metadata/**

      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: failure()

      - name: Store screenshot
        uses: ./.github/actions/capture-screenshot
        if: failure()
        with:
          suffix: unit-tests-${{ inputs.runner_provider }}-${{ inputs.platform }}-xcode-${{ inputs.xcode }}-os-${{ steps.resolve-test-destination.outputs.TEST_OS }}
