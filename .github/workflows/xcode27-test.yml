name: Xcode 27

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened, labeled]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-spm:
    name: Build SPM ${{ matrix.platform }}
    runs-on:
      - bitrise_pool_name:xcode-beta
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            sdk: iphoneos
            destination: "generic/platform=iphoneos"
          - platform: watchOS
            sdk: watchos
            destination: "generic/platform=watchOS"
          - platform: macOS
            sdk: macosx
            destination: "generic/platform=macOS"
          - platform: tvOS
            sdk: appletvos
            destination: "generic/platform=tvOS"
          - platform: visionOS
            sdk: xros
            destination: "generic/platform=visionOS"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: "27"
      - name: Build SPM (${{ matrix.platform }})
        run: |
          set -o pipefail && NSUnbufferedIO=YES xcodebuild \
            -workspace . \
            -scheme SentrySPM \
            -sdk ${{ matrix.sdk }} \
            -destination '${{ matrix.destination }}' \
            build 2>&1 | tee raw-build-output-spm-${{ matrix.sdk }}.log | xcbeautify --preserve-unbeautified
        shell: sh
      - name: Upload Build Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: raw-build-output-spm-${{ matrix.sdk }}
          path: raw-build-output-spm-${{ matrix.sdk }}.log
      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: ${{ failure() || cancelled() }}
