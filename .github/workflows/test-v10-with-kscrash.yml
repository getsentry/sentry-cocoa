name: Test v10 with KSCrash
on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ready-to-merge-gate:
    name: Ready-to-merge gate
    uses: ./.github/workflows/ready-to-merge-workflow.yml

  files-changed:
    name: Detect File Changes
    runs-on: ubuntu-latest
    needs: ready-to-merge-gate
    outputs:
      run_v10_with_kscrash_for_prs: ${{ steps.changes.outputs.run_v10_with_kscrash_for_prs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          token: ${{ github.token }}
          filters: .github/file-filters.yml

  build-test-server:
    name: Build test server
    if: github.event_name != 'pull_request' || needs.files-changed.outputs.run_v10_with_kscrash_for_prs == 'true'
    needs: files-changed
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache for Test Server
        id: cache_test_server
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ./test-server/.build
          key: test-server-${{ hashFiles('./test-server') }}-arm64
          restore-keys: |
            test-server-${{ hashFiles('./test-server') }}-arm64
            test-server-

      - name: Build Test Server
        if: steps.cache_test_server.outputs.cache-hit != 'true'
        working-directory: test-server
        run: >-
          swift build -c release --arch arm64 2>&1 | tee test-server-build.log

      - name: Copy Test Server Binary
        working-directory: test-server
        run: >-
          cp $(swift build --show-bin-path -c release --arch arm64)/Run test-server-exec

      - name: Archiving DerivedData
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-server
          path: |
            ./test-server/test-server-exec

      - name: Archiving Raw Test Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: test-server-build-log
          path: |
            test-server/test-server-build.log

      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: failure()

  test-v10-with-kscrash:
    name: Test v10 with KSCrash ${{ matrix.platform }}
    if: github.event_name != 'pull_request' || needs.files-changed.outputs.run_v10_with_kscrash_for_prs == 'true'
    needs: files-changed
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            make-target: test-ios-v10-with-kscrash
          - platform: macOS
            make-target: test-macos-v10-with-kscrash
          - platform: Catalyst
            make-target: test-catalyst-v10-with-kscrash
          - platform: tvOS
            make-target: test-tvos-v10-with-kscrash
          - platform: visionOS
            make-target: test-visionos-v10-with-kscrash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Xcode
        id: setup-xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: "26"

      - name: Resolve test destination
        id: resolve-test-destination
        uses: ./.github/actions/resolve-test-destination
        with:
          platform: ${{ matrix.platform }}

      - name: Ensure required runtime is loaded
        if: ${{ matrix.platform == 'iOS' || matrix.platform == 'tvOS' || matrix.platform == 'visionOS' }}
        timeout-minutes: 5
        env:
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
          PLATFORM: ${{ matrix.platform }}
        run: ./scripts/ci-ensure-runtime-loaded.sh --os-version "$OS_VERSION" --platform "$PLATFORM"

      - name: Run v10 with KSCrash tests
        env:
          IOS_SIMULATOR_OS: ${{ steps.setup-xcode.outputs.ios-simulator-os }}
          IOS_DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
          TVOS_SIMULATOR_OS: ${{ steps.setup-xcode.outputs.tvos-simulator-os }}
          TVOS_DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
          VISIONOS_SIMULATOR_OS: ${{ steps.setup-xcode.outputs.visionos-simulator-os }}
          VISIONOS_DEVICE_NAME: ${{ steps.resolve-test-destination.outputs.TEST_DEVICE }}
        run: make ${{ matrix.make-target }}

      - name: Archiving Raw Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: raw-output-v10-with-kscrash-${{ matrix.platform }}
          path: |
            raw-build-output.log
            raw-build-for-testing-output.log
            raw-test-output.log

      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: ${{ failure() || cancelled() }}

  test-v10-with-kscrash-with-test-server:
    name: Test v10 with KSCrash with Test Server
    if: github.event_name != 'pull_request' || needs.files-changed.outputs.run_v10_with_kscrash_for_prs == 'true'
    needs: [files-changed, build-test-server]
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-server

      - name: Start Test Server
        run: ./scripts/start-test-server.sh
      - name: Setup Xcode
        id: setup-xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: "26"

      - name: Resolve test destination
        id: resolve-test-destination
        uses: ./.github/actions/resolve-test-destination
        with:
          platform: macOS

      - name: Build tests
        id: build_tests
        env:
          REF_NAME: ${{ github.ref_name }}
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
        run: |
          ./scripts/sentry-xcodebuild.sh \
            --platform macOS \
            --os "${OS_VERSION}" \
            --ref "${REF_NAME}" \
            --command build-for-testing \
            --configuration TestKSCrash \
            --scheme SentryKSCrash \
            --test-plan Sentry_TestServer

      - name: Run tests
        env:
          REF_NAME: ${{ github.ref_name }}
          OS_VERSION: ${{ steps.resolve-test-destination.outputs.TEST_OS }}
        run: |
          ./scripts/sentry-xcodebuild.sh \
            --platform macOS \
            --os "${OS_VERSION}" \
            --ref "${REF_NAME}" \
            --command test-without-building \
            --configuration TestKSCrash \
            --scheme SentryKSCrash \
            --test-plan Sentry_TestServer

      - name: Archiving DerivedData Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: steps.build_tests.outcome == 'failure'
        with:
          name: derived-data-kscrash-test-server
          path: |
            /Users/runner/Library/Developer/Xcode/DerivedData/**/Logs/**

      - name: Archiving Raw Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: raw-output-kscrash-test-server
          path: |
            raw-build-output.log
            raw-build-for-testing-output.log
            raw-test-output.log

      - name: Archiving Crash Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ failure() || cancelled() }}
        with:
          name: crash-logs-kscrash-test-server
          path: |
            ~/Library/Logs/DiagnosticReports/**

      - name: Run CI Diagnostics
        uses: ./.github/actions/ci-diagnostics
        if: ${{ failure() || cancelled() }}

  test-kscrash-required-check:
    needs:
      [
        files-changed,
        build-test-server,
        test-v10-with-kscrash,
        test-v10-with-kscrash-with-test-server,
        ready-to-merge-gate,
      ]
    name: Test v10 with KSCrash
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One of the v10 with KSCrash test jobs has failed." && exit 1
