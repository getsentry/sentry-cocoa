name: Benchmark Bitrise Pools

on:
  workflow_dispatch:
  push:
    branches:
      - itay/test_ssd

jobs:
  benchmark-ipsw:
    name: IPSW - ${{ matrix.provider }}/${{ matrix.pool }}
    runs-on: ${{ matrix.provider == 'bitrise' && fromJSON(format('["bitrise_pool_name:{0}"]', matrix.pool)) || fromJSON(format('["ghcr.io/cirruslabs/macos-runner:{0},runner_concurrency_group={1}", "runner_group_id:10"]', matrix.pool, github.run_id)) }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: bitrise
            pool: tahoe-xl
          - provider: bitrise
            pool: tahoe
          - provider: bitrise
            pool: sequoia
          - provider: cirrus
            pool: sequoia
    env:
      IPSW_URL: "https://updates.cdn-apple.com/2026SpringSeed/fullrestores/122-80408/E0561061-40BA-40E4-97A9-9AE82AA91393/Apple_Vision_Pro_26.6_23O5728e_Restore.ipsw"
      FCS_KEYS_URL: "https://raw.githubusercontent.com/getsentry/symx/main/symx/ipsw/data/fcs-keys.json"
    steps:
      - name: System Info
        run: |
          echo "## System Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Provider:** ${{ matrix.provider }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pool:** ${{ matrix.pool }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** $(hostname)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **OS:** $(sw_vers -productName) $(sw_vers -productVersion)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CPU:** $(sysctl -n machdep.cpu.brand_string)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cores:** $(sysctl -n hw.ncpu)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Memory:** $(( $(sysctl -n hw.memsize) / 1073741824 )) GB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Disk:** $(diskutil info / | grep 'Total Size' || df -h / | tail -1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install ipsw CLI
        run: brew install blacktop/tap/ipsw

      - name: Download IPSW and FCS keys
        run: |
          echo "### IPSW Download" >> "$GITHUB_STEP_SUMMARY"
          START=$(python3 -c "import time; print(time.time())")
          curl -fSL -o restore.ipsw "$IPSW_URL"
          END=$(python3 -c "import time; print(time.time())")
          DL_SECS=$(python3 -c "print(round($END - $START, 2))")
          IPSW_SIZE_MB=$(python3 -c "import os; print(round(os.path.getsize('restore.ipsw') / 1_000_000, 1))")
          echo "- **Size:** ${IPSW_SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Download time:** ${DL_SECS}s" >> "$GITHUB_STEP_SUMMARY"
          curl -fSL -o fcs-keys.json "$FCS_KEYS_URL"

      - name: Create RAM disk
        run: |
          RAM_DEV=$(hdiutil attach -nomount ram://$((16 * 1024 * 2048)))
          RAM_DEV=$(echo "$RAM_DEV" | xargs)
          diskutil erasevolume HFS+ RAMDisk "$RAM_DEV"
          echo "RAM_DEV=$RAM_DEV" >> "$GITHUB_ENV"
          echo "- RAM disk (16GB) at /Volumes/RAMDisk" >> "$GITHUB_STEP_SUMMARY"

      # ---------- Test 1: disk → disk (baseline) ----------
      - name: "Test 1: Mount from disk, extract to disk"
        id: disk_disk
        timeout-minutes: 10
        run: |
          echo "### Test 1: Disk → Disk (baseline)" >> "$GITHUB_STEP_SUMMARY"
          MOUNT_POINT=$(mktemp -d)/mnt && mkdir -p "$MOUNT_POINT"
          purge 2>/dev/null || true

          START=$(python3 -c "import time; print(time.time())")
          ipsw mount sys restore.ipsw --pem-db fcs-keys.json --mount-point "$MOUNT_POINT" &
          IPSW_PID=$!

          MOUNTED=false
          for i in $(seq 1 180); do
            if mount | grep -q "$MOUNT_POINT"; then MOUNTED=true; break; fi
            if ! kill -0 $IPSW_PID 2>/dev/null; then break; fi
            sleep 1
          done
          END=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Mount:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
          echo "mount=${MOUNT_SECS}" >> "$GITHUB_OUTPUT"

          if [ "$MOUNTED" = "true" ]; then
            EXTRACT_DIR=$(mktemp -d)
            START=$(python3 -c "import time; print(time.time())")
            cp -R "$MOUNT_POINT"/ "$EXTRACT_DIR"/ 2>/dev/null || true
            END=$(python3 -c "import time; print(time.time())")
            EXTRACT_SECS=$(python3 -c "print(round($END - $START, 2))")
            echo "- **Extract:** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=${EXTRACT_SECS}" >> "$GITHUB_OUTPUT"
            rm -rf "$EXTRACT_DIR"
          else
            echo "- Mount failed" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=N/A" >> "$GITHUB_OUTPUT"
          fi

          kill $IPSW_PID 2>/dev/null || true; wait $IPSW_PID 2>/dev/null || true
          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true

      # ---------- Test 2: RAM → disk ----------
      - name: "Test 2: Mount from RAM, extract to disk"
        id: ram_disk
        timeout-minutes: 10
        run: |
          echo "### Test 2: RAM → Disk" >> "$GITHUB_STEP_SUMMARY"
          cp restore.ipsw /Volumes/RAMDisk/restore.ipsw
          cp fcs-keys.json /Volumes/RAMDisk/fcs-keys.json
          MOUNT_POINT=$(mktemp -d)/mnt && mkdir -p "$MOUNT_POINT"
          purge 2>/dev/null || true

          START=$(python3 -c "import time; print(time.time())")
          ipsw mount sys /Volumes/RAMDisk/restore.ipsw --pem-db /Volumes/RAMDisk/fcs-keys.json --mount-point "$MOUNT_POINT" &
          IPSW_PID=$!

          MOUNTED=false
          for i in $(seq 1 180); do
            if mount | grep -q "$MOUNT_POINT"; then MOUNTED=true; break; fi
            if ! kill -0 $IPSW_PID 2>/dev/null; then break; fi
            sleep 1
          done
          END=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Mount:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
          echo "mount=${MOUNT_SECS}" >> "$GITHUB_OUTPUT"

          if [ "$MOUNTED" = "true" ]; then
            EXTRACT_DIR=$(mktemp -d)
            START=$(python3 -c "import time; print(time.time())")
            cp -R "$MOUNT_POINT"/ "$EXTRACT_DIR"/ 2>/dev/null || true
            END=$(python3 -c "import time; print(time.time())")
            EXTRACT_SECS=$(python3 -c "print(round($END - $START, 2))")
            echo "- **Extract:** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=${EXTRACT_SECS}" >> "$GITHUB_OUTPUT"
            rm -rf "$EXTRACT_DIR"
          else
            echo "- Mount failed" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=N/A" >> "$GITHUB_OUTPUT"
          fi

          kill $IPSW_PID 2>/dev/null || true; wait $IPSW_PID 2>/dev/null || true
          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true
          rm -f /Volumes/RAMDisk/restore.ipsw /Volumes/RAMDisk/fcs-keys.json

      # ---------- Test 3: RAM → RAM ----------
      - name: "Test 3: Mount from RAM, extract to RAM"
        id: ram_ram
        timeout-minutes: 10
        run: |
          echo "### Test 3: RAM → RAM (zero disk I/O)" >> "$GITHUB_STEP_SUMMARY"
          cp restore.ipsw /Volumes/RAMDisk/restore.ipsw
          cp fcs-keys.json /Volumes/RAMDisk/fcs-keys.json
          MOUNT_POINT=$(mktemp -d)/mnt && mkdir -p "$MOUNT_POINT"
          purge 2>/dev/null || true

          START=$(python3 -c "import time; print(time.time())")
          ipsw mount sys /Volumes/RAMDisk/restore.ipsw --pem-db /Volumes/RAMDisk/fcs-keys.json --mount-point "$MOUNT_POINT" &
          IPSW_PID=$!

          MOUNTED=false
          for i in $(seq 1 180); do
            if mount | grep -q "$MOUNT_POINT"; then MOUNTED=true; break; fi
            if ! kill -0 $IPSW_PID 2>/dev/null; then break; fi
            sleep 1
          done
          END=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Mount:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
          echo "mount=${MOUNT_SECS}" >> "$GITHUB_OUTPUT"

          if [ "$MOUNTED" = "true" ]; then
            START=$(python3 -c "import time; print(time.time())")
            cp -R "$MOUNT_POINT"/ /Volumes/RAMDisk/extracted/ 2>/dev/null || true
            END=$(python3 -c "import time; print(time.time())")
            EXTRACT_SECS=$(python3 -c "print(round($END - $START, 2))")
            echo "- **Extract:** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=${EXTRACT_SECS}" >> "$GITHUB_OUTPUT"
            rm -rf /Volumes/RAMDisk/extracted
          else
            echo "- Mount failed" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=N/A" >> "$GITHUB_OUTPUT"
          fi

          kill $IPSW_PID 2>/dev/null || true; wait $IPSW_PID 2>/dev/null || true
          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true
          rm -f /Volumes/RAMDisk/restore.ipsw /Volumes/RAMDisk/fcs-keys.json

      # ---------- Test 4: pre-extract DMG to RAM, then mount ----------
      - name: "Test 4: Pre-extract DMG to RAM, then mount"
        id: preextract_ram
        timeout-minutes: 10
        run: |
          echo "### Test 4: Pre-extract DMG to RAM → Mount" >> "$GITHUB_STEP_SUMMARY"

          START_UNZIP=$(python3 -c "import time; print(time.time())")
          unzip -o restore.ipsw -d /Volumes/RAMDisk/ipsw_contents
          END_UNZIP=$(python3 -c "import time; print(time.time())")
          UNZIP_SECS=$(python3 -c "print(round($END_UNZIP - $START_UNZIP, 2))")
          echo "- **Unzip to RAM:** ${UNZIP_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          cp fcs-keys.json /Volumes/RAMDisk/fcs-keys.json
          MOUNT_POINT=$(mktemp -d)/mnt && mkdir -p "$MOUNT_POINT"
          purge 2>/dev/null || true

          START=$(python3 -c "import time; print(time.time())")
          ipsw mount sys /Volumes/RAMDisk/ipsw_contents --pem-db /Volumes/RAMDisk/fcs-keys.json --mount-point "$MOUNT_POINT" &
          IPSW_PID=$!

          MOUNTED=false
          for i in $(seq 1 180); do
            if mount | grep -q "$MOUNT_POINT"; then MOUNTED=true; break; fi
            if ! kill -0 $IPSW_PID 2>/dev/null; then break; fi
            sleep 1
          done
          END=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Mount:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
          echo "mount=${MOUNT_SECS}" >> "$GITHUB_OUTPUT"

          if [ "$MOUNTED" = "true" ]; then
            START=$(python3 -c "import time; print(time.time())")
            cp -R "$MOUNT_POINT"/ /Volumes/RAMDisk/extracted/ 2>/dev/null || true
            END=$(python3 -c "import time; print(time.time())")
            EXTRACT_SECS=$(python3 -c "print(round($END - $START, 2))")
            echo "- **Extract to RAM:** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=${EXTRACT_SECS}" >> "$GITHUB_OUTPUT"
            rm -rf /Volumes/RAMDisk/extracted
          else
            echo "- Mount failed" >> "$GITHUB_STEP_SUMMARY"
            echo "extract=N/A" >> "$GITHUB_OUTPUT"
          fi

          kill $IPSW_PID 2>/dev/null || true; wait $IPSW_PID 2>/dev/null || true
          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true
          rm -rf /Volumes/RAMDisk/ipsw_contents /Volumes/RAMDisk/fcs-keys.json

      - name: Cleanup
        if: always()
        run: |
          # Kill any lingering ipsw processes
          pkill -f "ipsw mount" 2>/dev/null || true
          # Detach any leftover mounts
          mount | grep "/tmp/" | awk '{print $3}' | while read mp; do
            hdiutil detach "$mp" 2>/dev/null || true
          done
          hdiutil detach "$RAM_DEV" 2>/dev/null || true
          rm -f restore.ipsw fcs-keys.json

      - name: Save results
        if: always()
        run: |
          mkdir -p results
          echo "${{ matrix.provider }},${{ matrix.pool }},${{ steps.disk_disk.outputs.mount }},${{ steps.disk_disk.outputs.extract }},${{ steps.ram_disk.outputs.mount }},${{ steps.ram_disk.outputs.extract }},${{ steps.ram_ram.outputs.mount }},${{ steps.ram_ram.outputs.extract }},${{ steps.preextract_ram.outputs.mount }},${{ steps.preextract_ram.outputs.extract }}" > results/${{ matrix.provider }}-${{ matrix.pool }}.csv

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-${{ matrix.provider }}-${{ matrix.pool }}
          path: results/

  summary:
    name: Results Summary
    needs: benchmark-ipsw
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: bench-*
          merge-multiple: true

      - name: Build comparison table
        run: |
          echo "## IPSW Mount Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Pool | Disk→Disk Mount | Disk→Disk Extract | RAM→Disk Mount | RAM→Disk Extract | RAM→RAM Mount | RAM→RAM Extract | Pre-extract Mount | Pre-extract Extract |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|-----------------|-------------------|----------------|------------------|---------------|-----------------|-------------------|---------------------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *.csv; do
            [ -f "$f" ] || continue
            while IFS=, read -r provider pool dd_m dd_e rd_m rd_e rr_m rr_e pe_m pe_e; do
              echo "| $provider | $pool | $dd_m | $dd_e | $rd_m | $rd_e | $rr_m | $rr_e | $pe_m | $pe_e |" >> "$GITHUB_STEP_SUMMARY"
            done < "$f"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### What each test measures" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Disk→Disk**: Baseline — read IPSW from disk, extract to disk" >> "$GITHUB_STEP_SUMMARY"
          echo "- **RAM→Disk**: IPSW in RAM, extract to disk — isolates disk write speed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **RAM→RAM**: Everything in RAM — isolates CPU (decrypt/decompress)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pre-extract**: Unzip IPSW to RAM first, then mount — tests if pre-extracted DMG mounts faster" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "_Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_" >> "$GITHUB_STEP_SUMMARY"
