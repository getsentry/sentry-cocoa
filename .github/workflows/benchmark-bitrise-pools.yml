name: Benchmark Bitrise Pools

on:
  workflow_dispatch:
  push:
    branches:
      - itay/test_ssd

jobs:
  benchmark-disk-io:
    name: Disk IO - ${{ matrix.provider }}/${{ matrix.pool }}
    runs-on: ${{ matrix.provider == 'bitrise' && fromJSON(format('["bitrise_pool_name:{0}"]', matrix.pool)) || fromJSON(format('["ghcr.io/cirruslabs/macos-runner:{0},runner_concurrency_group={1}", "runner_group_id:10"]', matrix.pool, github.run_id)) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: bitrise
            pool: tahoe-xl
          - provider: bitrise
            pool: tahoe
          - provider: bitrise
            pool: sequoia
          - provider: cirrus
            pool: sequoia
    steps:
      - name: System Info
        run: |
          echo "## System Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Provider:** ${{ matrix.provider }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pool:** ${{ matrix.pool }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** $(hostname)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **OS:** $(sw_vers -productName) $(sw_vers -productVersion)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CPU:** $(sysctl -n machdep.cpu.brand_string)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cores:** $(sysctl -n hw.ncpu)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Memory:** $(( $(sysctl -n hw.memsize) / 1073741824 )) GB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Disk:** $(diskutil info / | grep 'Total Size' || df -h / | tail -1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install fio
        run: brew install fio

      - name: Run fio benchmarks
        id: fio
        run: |
          cat > bench.fio <<'FIOEOF'
          [global]
          ioengine=posixaio
          direct=1
          runtime=30
          time_based
          numjobs=1
          group_reporting

          [seq_write]
          rw=write
          bs=1m
          size=1G
          stonewall

          [seq_read]
          rw=read
          bs=1m
          size=1G
          stonewall

          [rand_write]
          rw=randwrite
          bs=4k
          size=256M
          stonewall

          [rand_read]
          rw=randread
          bs=4k
          size=256M
          stonewall
          FIOEOF
          fio bench.fio --output-format=json --output=fio-results.json
          cat fio-results.json

      - name: Parse results
        id: parse
        run: |
          python3 <<'PYEOF'
          import json, os

          with open("fio-results.json") as f:
              data = json.load(f)

          results = {}
          for job in data["jobs"]:
              name = job["jobname"]
              if "write" in name:
                  bw = job["write"]["bw"]       # KB/s
                  iops = job["write"]["iops"]
              else:
                  bw = job["read"]["bw"]
                  iops = job["read"]["iops"]
              results[name] = {"mb_s": round(bw / 1024, 1), "iops": round(iops, 1)}

          sw = results["seq_write"]
          sr = results["seq_read"]
          rw = results["rand_write"]
          rr = results["rand_read"]

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"seq_write={sw['mb_s']} MB/s\n")
              out.write(f"seq_read={sr['mb_s']} MB/s\n")
              out.write(f"rand_write={rw['mb_s']} MB/s ({rw['iops']} IOPS)\n")
              out.write(f"rand_read={rr['mb_s']} MB/s ({rr['iops']} IOPS)\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as summary:
              summary.write("## fio Benchmark Results\n\n")
              summary.write(f"| Test | Throughput | IOPS |\n")
              summary.write(f"|------|-----------|------|\n")
              for name, r in results.items():
                  summary.write(f"| {name} | {r['mb_s']} MB/s | {r['iops']} |\n")
          PYEOF

      - name: Benchmark IPSW-style mount
        id: ipsw_mount
        run: |
          echo "### IPSW-style Mount Benchmark" >> "$GITHUB_STEP_SUMMARY"

          # Create a 2GB DMG with random content to simulate an IPSW inner image
          DMG_DIR=$(mktemp -d)
          dd if=/dev/urandom of="$DMG_DIR/payload" bs=1m count=512 2>/dev/null
          mkdir -p "$DMG_DIR/symbols"
          for i in $(seq 1 200); do
            dd if=/dev/urandom of="$DMG_DIR/symbols/sym_$i.dylib" bs=32768 count=10 2>/dev/null
          done

          # Create compressed DMG (like IPSW inner images)
          START_CREATE=$(python3 -c "import time; print(time.time())")
          hdiutil create -srcfolder "$DMG_DIR" -format UDBZ -o test_ipsw.dmg 2>&1
          END_CREATE=$(python3 -c "import time; print(time.time())")
          DMG_SIZE=$(stat -f%z test_ipsw.dmg)
          DMG_SIZE_MB=$(python3 -c "print(round($DMG_SIZE / 1_000_000, 1))")
          CREATE_SECS=$(python3 -c "print(round($END_CREATE - $START_CREATE, 2))")
          echo "- DMG size: ${DMG_SIZE_MB} MB (created in ${CREATE_SECS}s)" >> "$GITHUB_STEP_SUMMARY"
          rm -rf "$DMG_DIR"

          # Benchmark: mount the compressed DMG
          purge 2>/dev/null || true
          START_MOUNT=$(python3 -c "import time; print(time.time())")
          MOUNT_OUTPUT=$(hdiutil attach test_ipsw.dmg -noverify -readonly 2>&1)
          END_MOUNT=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END_MOUNT - $START_MOUNT, 2))")
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | tail -1 | awk '{print $NF}')
          echo "- **Mount time:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          # Benchmark: read all files from mounted DMG (simulates extraction)
          START_READ=$(python3 -c "import time; print(time.time())")
          find "$MOUNT_POINT" -type f -exec cat {} + > /dev/null 2>&1
          END_READ=$(python3 -c "import time; print(time.time())")
          READ_SECS=$(python3 -c "print(round($END_READ - $START_READ, 2))")
          echo "- **Read all files:** ${READ_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          # Benchmark: copy all files out (simulates IPSW extraction to disk)
          EXTRACT_DIR=$(mktemp -d)
          purge 2>/dev/null || true
          START_EXTRACT=$(python3 -c "import time; print(time.time())")
          cp -R "$MOUNT_POINT"/ "$EXTRACT_DIR"/
          END_EXTRACT=$(python3 -c "import time; print(time.time())")
          EXTRACT_SECS=$(python3 -c "print(round($END_EXTRACT - $START_EXTRACT, 2))")
          echo "- **Extract (copy out):** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_SECS=$(python3 -c "print(round($MOUNT_SECS + $READ_SECS + $EXTRACT_SECS, 2))")
          echo "- **Total (mount+read+extract):** ${TOTAL_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          echo "mount=${MOUNT_SECS}s" >> "$GITHUB_OUTPUT"
          echo "read=${READ_SECS}s" >> "$GITHUB_OUTPUT"
          echo "extract=${EXTRACT_SECS}s" >> "$GITHUB_OUTPUT"
          echo "total=${TOTAL_SECS}s" >> "$GITHUB_OUTPUT"

          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true
          rm -rf "$EXTRACT_DIR" test_ipsw.dmg

      - name: Save results
        run: |
          mkdir -p results
          echo "${{ matrix.provider }},${{ matrix.pool }},${{ steps.parse.outputs.seq_write }},${{ steps.parse.outputs.seq_read }},${{ steps.parse.outputs.rand_write }},${{ steps.parse.outputs.rand_read }},${{ steps.ipsw_mount.outputs.mount }},${{ steps.ipsw_mount.outputs.read }},${{ steps.ipsw_mount.outputs.extract }},${{ steps.ipsw_mount.outputs.total }}" > results/${{ matrix.provider }}-${{ matrix.pool }}.csv

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-${{ matrix.provider }}-${{ matrix.pool }}
          path: results/

      - name: Upload raw fio output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fio-raw-${{ matrix.provider }}-${{ matrix.pool }}
          path: fio-results.json

  summary:
    name: Results Summary
    needs: benchmark-disk-io
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: bench-*
          merge-multiple: true

      - name: Build comparison table
        run: |
          echo "## Disk IO Benchmark Results (fio)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Pool | Seq Write | Seq Read | Rand Write (4K) | Rand Read (4K) | IPSW Mount | IPSW Read | IPSW Extract | IPSW Total |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|-----------|----------|-----------------|----------------|------------|-----------|--------------|------------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *.csv; do
            [ -f "$f" ] || continue
            while IFS=, read -r provider pool seq_w seq_r rand_w rand_r ipsw_mount ipsw_read ipsw_extract ipsw_total; do
              echo "| $provider | $pool | $seq_w | $seq_r | $rand_w | $rand_r | $ipsw_mount | $ipsw_read | $ipsw_extract | $ipsw_total |" >> "$GITHUB_STEP_SUMMARY"
            done < "$f"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "_Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_" >> "$GITHUB_STEP_SUMMARY"
