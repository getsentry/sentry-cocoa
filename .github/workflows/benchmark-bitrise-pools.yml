name: Benchmark Bitrise Pools

on:
  workflow_dispatch:
  push:
    branches:
      - itay/test_ssd

jobs:
  benchmark-disk-io:
    name: Disk IO - ${{ matrix.provider }}/${{ matrix.pool }}
    runs-on: ${{ matrix.provider == 'bitrise' && fromJSON(format('["bitrise_pool_name:{0}"]', matrix.pool)) || fromJSON(format('["ghcr.io/cirruslabs/macos-runner:{0},runner_concurrency_group={1}", "runner_group_id:10"]', matrix.pool, github.run_id)) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: bitrise
            pool: tahoe-xl
          - provider: bitrise
            pool: tahoe
          - provider: bitrise
            pool: sequoia
          - provider: cirrus
            pool: sequoia
    steps:
      - name: System Info
        run: |
          echo "## System Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Provider:** ${{ matrix.provider }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pool:** ${{ matrix.pool }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runner:** $(hostname)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **OS:** $(sw_vers -productName) $(sw_vers -productVersion)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CPU:** $(sysctl -n machdep.cpu.brand_string)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cores:** $(sysctl -n hw.ncpu)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Memory:** $(( $(sysctl -n hw.memsize) / 1073741824 )) GB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Disk:** $(diskutil info / | grep 'Total Size' || df -h / | tail -1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install fio
        run: brew install fio

      - name: Run fio benchmarks
        id: fio
        run: |
          cat > bench.fio <<'FIOEOF'
          [global]
          ioengine=posixaio
          direct=1
          runtime=30
          time_based
          numjobs=1
          group_reporting

          [seq_write]
          rw=write
          bs=1m
          size=1G
          stonewall

          [seq_read]
          rw=read
          bs=1m
          size=1G
          stonewall

          [rand_write]
          rw=randwrite
          bs=4k
          size=256M
          stonewall

          [rand_read]
          rw=randread
          bs=4k
          size=256M
          stonewall
          FIOEOF
          fio bench.fio --output-format=json --output=fio-results.json
          cat fio-results.json

      - name: Parse results
        id: parse
        run: |
          python3 <<'PYEOF'
          import json, os

          with open("fio-results.json") as f:
              data = json.load(f)

          results = {}
          for job in data["jobs"]:
              name = job["jobname"]
              if "write" in name:
                  bw = job["write"]["bw"]       # KB/s
                  iops = job["write"]["iops"]
              else:
                  bw = job["read"]["bw"]
                  iops = job["read"]["iops"]
              results[name] = {"mb_s": round(bw / 1024, 1), "iops": round(iops, 1)}

          sw = results["seq_write"]
          sr = results["seq_read"]
          rw = results["rand_write"]
          rr = results["rand_read"]

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"seq_write={sw['mb_s']} MB/s\n")
              out.write(f"seq_read={sr['mb_s']} MB/s\n")
              out.write(f"rand_write={rw['mb_s']} MB/s ({rw['iops']} IOPS)\n")
              out.write(f"rand_read={rr['mb_s']} MB/s ({rr['iops']} IOPS)\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as summary:
              summary.write("## fio Benchmark Results\n\n")
              summary.write(f"| Test | Throughput | IOPS |\n")
              summary.write(f"|------|-----------|------|\n")
              for name, r in results.items():
                  summary.write(f"| {name} | {r['mb_s']} MB/s | {r['iops']} |\n")
          PYEOF

      - name: Install ipsw CLI
        run: brew install blacktop/tap/ipsw

      - name: Download IPSW and FCS keys
        run: |
          echo "### IPSW Download" >> "$GITHUB_STEP_SUMMARY"
          IPSW_URL="https://updates.cdn-apple.com/2026SpringSeed/fullrestores/122-80408/E0561061-40BA-40E4-97A9-9AE82AA91393/Apple_Vision_Pro_26.6_23O5728e_Restore.ipsw"
          START=$(python3 -c "import time; print(time.time())")
          curl -fSL -o restore.ipsw "$IPSW_URL"
          END=$(python3 -c "import time; print(time.time())")
          DL_SECS=$(python3 -c "print(round($END - $START, 2))")
          IPSW_SIZE=$(stat -f%z restore.ipsw)
          IPSW_SIZE_MB=$(python3 -c "print(round($IPSW_SIZE / 1_000_000, 1))")
          echo "- **Size:** ${IPSW_SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Download time:** ${DL_SECS}s" >> "$GITHUB_STEP_SUMMARY"
          curl -fSL -o fcs-keys.json "https://raw.githubusercontent.com/getsentry/symx/main/symx/ipsw/data/fcs-keys.json"

      - name: Benchmark IPSW mount to disk
        id: ipsw_mount
        run: |
          echo "### IPSW Mount to Disk" >> "$GITHUB_STEP_SUMMARY"
          MOUNT_POINT=$(mktemp -d)/mnt
          mkdir -p "$MOUNT_POINT"

          purge 2>/dev/null || true
          START=$(python3 -c "import time; print(time.time())")
          ipsw mount sys restore.ipsw --pem-db fcs-keys.json --mount-point "$MOUNT_POINT" 2>&1 || true
          END=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Mount time:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          if ! mount | grep -q "$MOUNT_POINT"; then
            echo "- Mount failed" >> "$GITHUB_STEP_SUMMARY"
            echo "disk_mount=N/A" >> "$GITHUB_OUTPUT"
            echo "disk_extract=N/A" >> "$GITHUB_OUTPUT"
            echo "ram_mount=N/A" >> "$GITHUB_OUTPUT"
            echo "ram_extract=N/A" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Benchmark: copy all files out to disk
          EXTRACT_DIR=$(mktemp -d)
          START=$(python3 -c "import time; print(time.time())")
          cp -R "$MOUNT_POINT"/ "$EXTRACT_DIR"/ 2>/dev/null || true
          END=$(python3 -c "import time; print(time.time())")
          EXTRACT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Extract to disk:** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          echo "disk_mount=${MOUNT_SECS}s" >> "$GITHUB_OUTPUT"
          echo "disk_extract=${EXTRACT_SECS}s" >> "$GITHUB_OUTPUT"

          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true
          rm -rf "$EXTRACT_DIR"

      - name: Benchmark IPSW mount to RAM disk
        id: ipsw_ram
        run: |
          echo "### IPSW Mount to RAM Disk" >> "$GITHUB_STEP_SUMMARY"

          # Create a 16GB RAM disk
          RAM_DEV=$(hdiutil attach -nomount ram://$((16 * 1024 * 2048)))
          RAM_DEV=$(echo "$RAM_DEV" | xargs)
          diskutil erasevolume HFS+ RAMDisk "$RAM_DEV"
          echo "- RAM disk created at $RAM_DEV (/Volumes/RAMDisk)" >> "$GITHUB_STEP_SUMMARY"

          MOUNT_POINT=$(mktemp -d)/mnt
          mkdir -p "$MOUNT_POINT"

          purge 2>/dev/null || true
          START=$(python3 -c "import time; print(time.time())")
          ipsw mount sys restore.ipsw --pem-db fcs-keys.json --mount-point "$MOUNT_POINT" 2>&1 || true
          END=$(python3 -c "import time; print(time.time())")
          MOUNT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Mount time:** ${MOUNT_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          if ! mount | grep -q "$MOUNT_POINT"; then
            echo "- Mount failed" >> "$GITHUB_STEP_SUMMARY"
            echo "ram_mount=N/A" >> "$GITHUB_OUTPUT"
            echo "ram_extract=N/A" >> "$GITHUB_OUTPUT"
            hdiutil detach "$RAM_DEV" 2>/dev/null || true
            exit 0
          fi

          # Benchmark: copy all files out to RAM disk
          START=$(python3 -c "import time; print(time.time())")
          cp -R "$MOUNT_POINT"/ /Volumes/RAMDisk/extracted/ 2>/dev/null || true
          END=$(python3 -c "import time; print(time.time())")
          EXTRACT_SECS=$(python3 -c "print(round($END - $START, 2))")
          echo "- **Extract to RAM disk:** ${EXTRACT_SECS}s" >> "$GITHUB_STEP_SUMMARY"

          echo "ram_mount=${MOUNT_SECS}s" >> "$GITHUB_OUTPUT"
          echo "ram_extract=${EXTRACT_SECS}s" >> "$GITHUB_OUTPUT"

          hdiutil detach "$MOUNT_POINT" 2>/dev/null || true
          hdiutil detach "$RAM_DEV" 2>/dev/null || true
          rm -f restore.ipsw fcs-keys.json

      - name: Save results
        run: |
          mkdir -p results
          echo "${{ matrix.provider }},${{ matrix.pool }},${{ steps.parse.outputs.seq_write }},${{ steps.parse.outputs.seq_read }},${{ steps.parse.outputs.rand_write }},${{ steps.parse.outputs.rand_read }},${{ steps.ipsw_mount.outputs.disk_mount }},${{ steps.ipsw_mount.outputs.disk_extract }},${{ steps.ipsw_ram.outputs.ram_mount }},${{ steps.ipsw_ram.outputs.ram_extract }}" > results/${{ matrix.provider }}-${{ matrix.pool }}.csv

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-${{ matrix.provider }}-${{ matrix.pool }}
          path: results/

      - name: Upload raw fio output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fio-raw-${{ matrix.provider }}-${{ matrix.pool }}
          path: fio-results.json

  summary:
    name: Results Summary
    needs: benchmark-disk-io
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: bench-*
          merge-multiple: true

      - name: Build comparison table
        run: |
          echo "## Disk IO Benchmark Results (fio)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Pool | Seq Write | Seq Read | Rand Write (4K) | Rand Read (4K) | IPSW Mount (disk) | IPSW Extract (disk) | IPSW Mount (RAM) | IPSW Extract (RAM) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|-----------|----------|-----------------|----------------|-------------------|---------------------|------------------|---------------------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *.csv; do
            [ -f "$f" ] || continue
            while IFS=, read -r provider pool seq_w seq_r rand_w rand_r disk_mount disk_extract ram_mount ram_extract; do
              echo "| $provider | $pool | $seq_w | $seq_r | $rand_w | $rand_r | $disk_mount | $disk_extract | $ram_mount | $ram_extract |" >> "$GITHUB_STEP_SUMMARY"
            done < "$f"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "_Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_" >> "$GITHUB_STEP_SUMMARY"
