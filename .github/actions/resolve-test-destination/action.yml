name: "Resolve test destination"
description: >-
  Resolves the simulator OS version and device name for a test run.
  When `test-destination-os` or `device` are provided they pass through unchanged.
  When omitted (empty), the action falls back to the values exported by
  `setup-xcode` for the given platform (e.g. IOS_SIMULATOR_OS). For iOS,
  the device defaults to the newest "iPhone N Pro" in the resolved runtime.
inputs:
  test-destination-os:
    description: >-
      Explicit simulator OS version (e.g. "17.5"). Leave empty to use the
      default for the selected Xcode.
    required: false
    default: ""
  device:
    description: >-
      Explicit device name (e.g. "iPhone 15 Pro"). Leave empty to auto-detect
      per platform (newest iPhone Pro for iOS, Apple TV for tvOS, etc.).
    required: false
    default: ""
  platform:
    description: "Target platform: iOS, macOS, tvOS, watchOS, visionOS, or Catalyst."
    required: true
outputs:
  TEST_OS:
    description: "Resolved simulator OS version."
    value: ${{ steps.resolve.outputs.TEST_OS }}
  TEST_DEVICE:
    description: "Resolved device name."
    value: ${{ steps.resolve.outputs.TEST_DEVICE }}
runs:
  using: "composite"
  steps:
    - name: Resolve test destination
      id: resolve
      shell: bash
      env:
        INPUT_OS: ${{ inputs.test-destination-os }}
        INPUT_DEVICE: ${{ inputs.device }}
        PLATFORM: ${{ inputs.platform }}
      run: |
        if [ -n "$INPUT_OS" ]; then
          TEST_OS="$INPUT_OS"
        else
          case "$PLATFORM" in
            iOS|Catalyst) TEST_OS="${IOS_SIMULATOR_OS:-latest}" ;;
            tvOS)         TEST_OS="${TVOS_SIMULATOR_OS:-latest}" ;;
            watchOS)      TEST_OS="${WATCHOS_SIMULATOR_OS:-latest}" ;;
            visionOS)     TEST_OS="${VISIONOS_SIMULATOR_OS:-latest}" ;;
            macOS)        TEST_OS="latest" ;;
            *)            TEST_OS="latest" ;;
          esac
        fi
        if [ -n "$INPUT_DEVICE" ]; then
          TEST_DEVICE="$INPUT_DEVICE"
        else
          case "$PLATFORM" in
            iOS|Catalyst)
              # Pick the newest "iPhone N Pro" (excluding Max/Plus) available in
              # the resolved iOS runtime. `simctl list devices` groups by major.minor
              # so strip any patch component before searching.
              OS_MM=$(echo "$TEST_OS" | awk -F. '{print $1"."$2}')
              TEST_DEVICE=$(xcrun simctl list devices available 2>/dev/null \
                | awk -v platform="iOS" -v version="$OS_MM" '
                    $0 ~ "^-- " platform " " version " --" { in_section = 1; next }
                    in_section { if (/^-- /) exit; print }' \
                | grep -E "iPhone [0-9]+ Pro \(" \
                | sed -E 's/^[[:space:]]*(iPhone [0-9]+ Pro)[[:space:]]+\(.*$/\1/' \
                | sort -V \
                | tail -n1) || TEST_DEVICE=""
              ;;
            tvOS)         TEST_DEVICE="Apple TV" ;;
            watchOS)
              # Pick the newest Apple Watch available in the resolved watchOS runtime.
              # Watch names include parenthetical sizes (e.g. "Apple Watch Ultra 3 (49mm)")
              # so we strip from the UUID pattern `(XXXX-...) (State)` rather than the
              # first `(`, which would lose the size.
              OS_MM=$(echo "$TEST_OS" | awk -F. '{print $1"."$2}')
              TEST_DEVICE=$(xcrun simctl list devices available 2>/dev/null \
                | awk -v platform="watchOS" -v version="$OS_MM" '
                    $0 ~ "^-- " platform " " version " --" { in_section = 1; next }
                    in_section { if (/^-- /) exit; print }' \
                | grep -E "Apple Watch" \
                | sed -E 's/^[[:space:]]+//; s/ \([A-F0-9-]+\) \([A-Za-z]+\)[[:space:]]*$//' \
                | sort -V \
                | tail -n1) || TEST_DEVICE=""
              ;;
            visionOS)     TEST_DEVICE="Apple Vision Pro" ;;
            *)            TEST_DEVICE="" ;;
          esac
        fi

        echo "TEST_OS=$TEST_OS" >> "$GITHUB_OUTPUT"
        echo "TEST_DEVICE=$TEST_DEVICE" >> "$GITHUB_OUTPUT"
        echo "TEST_OS=$TEST_OS" >> "$GITHUB_ENV"
        echo "TEST_DEVICE=$TEST_DEVICE" >> "$GITHUB_ENV"
        echo "Resolved: platform=$PLATFORM os=$TEST_OS device=$TEST_DEVICE"
