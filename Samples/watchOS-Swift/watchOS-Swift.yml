# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: watchOS-Swift
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  watchOS-Swift:
    type: "application.watchapp2"
    platform: auto
    sources:
      # Resources
      - path: WatchApp/Resources
        type: group
        group: WatchApp
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: WatchApp/Resources
      # Configurations
      - path: WatchApp/Configurations
        type: group
        group: WatchApp
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: WatchApp/Configurations
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: watchOS-Swift.yml
        group: WatchApp/Configurations
        buildPhase: none
    dependencies:
      - target: Extension
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: WatchApp/Configurations/watchOS-Swift-App.xcconfig
      Release: WatchApp/Configurations/watchOS-Swift-App.xcconfig
      Test: WatchApp/Configurations/watchOS-Swift-App.xcconfig
      TestCI: WatchApp/Configurations/watchOS-Swift-App.xcconfig
  Extension:
    type: "watchkit2-extension"
    platform: auto
    sources:
      # Sources
      - path: Extension/Sources
        type: group
        group: Extension
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: Extension/Resources
        type: group
        group: Extension
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: Extension/Resources
      # Configurations
      - path: Extension/Configurations
        type: group
        group: Extension
        buildPhase: none
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: Sentry/Sentry
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: Extension/Configurations/watchOS-Swift-Extension.xcconfig
      Release: Extension/Configurations/watchOS-Swift-Extension.xcconfig
      Test: Extension/Configurations/watchOS-Swift-Extension.xcconfig
      TestCI: Extension/Configurations/watchOS-Swift-Extension.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
schemes:
  "watchOS-Swift WatchKit App":
    templates:
      - SampleAppScheme
    build:
      targets:
        watchOS-Swift: all
