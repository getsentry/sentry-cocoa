# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: macOS-Swift
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  macOS-Swift:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
          - "**/Info.plist"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: macOS-Swift.yml
        group: App/Configurations
        buildPhase: none
      - path: ../../Plans/macOS-Swift_Base.xctestplan
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: App/Configurations/macOS-Swift.xcconfig
      Release: App/Configurations/macOS-Swift.xcconfig
      Test: App/Configurations/macOS-Swift.xcconfig
      TestCI: App/Configurations/macOS-Swift.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
  macOS-Swift-UITests:
    type: bundle.ui-testing
    platform: auto
    dependencies:
      - target: macOS-Swift
      - target: macOS-Swift-Other
      - target: macOS-Swift-Sandboxed
      - target: macOS-Swift-Sandboxed-Other
      - target: SentrySampleShared/SentrySampleShared
    sources:
      # Sources
      - path: UITests/Sources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: UITests/Resources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
    configFiles:
      Debug: App/Configurations/macOS-Swift-UITests.xcconfig
      Release: App/Configurations/macOS-Swift-UITests.xcconfig
      Test: App/Configurations/macOS-Swift-UITests.xcconfig
      TestCI: App/Configurations/macOS-Swift-UITests.xcconfig

  # The remaining app targets (macOS-Swift-Other, macOS-Swift-Sandboxed, macOS-Swift-Sandboxed-Other)
  # were created primarily to help reproduce https://github.com/getsentry/sentry-cocoa/issues/5142
  # in macOS-Swift-UITests, where two unsandboxed mac apps would write a launch profile config
  # file to a common caches location.

  macOS-Swift-Other:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
          - "**/Info.plist"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: App/Configurations/macOS-Swift-Other.xcconfig
      Release: App/Configurations/macOS-Swift-Other.xcconfig
      Test: App/Configurations/macOS-Swift-Other.xcconfig
      TestCI: App/Configurations/macOS-Swift-Other.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
  macOS-Swift-Sandboxed:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
          - "**/Info.plist"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: App/Configurations/macOS-Swift-Sandboxed.xcconfig
      Release: App/Configurations/macOS-Swift-Sandboxed.xcconfig
      Test: App/Configurations/macOS-Swift-Sandboxed.xcconfig
      TestCI: App/Configurations/macOS-Swift-Sandboxed.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
  macOS-Swift-Sandboxed-Other:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
          - "**/Info.plist"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: App/Configurations/macOS-Swift-Sandboxed-Other.xcconfig
      Release: App/Configurations/macOS-Swift-Sandboxed-Other.xcconfig
      Test: App/Configurations/macOS-Swift-Sandboxed-Other.xcconfig
      TestCI: App/Configurations/macOS-Swift-Sandboxed-Other.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
schemes:
  macOS-Swift:
    templates:
      - SampleAppScheme
    build:
      targets:
        macOS-Swift: all
    test:
      config: Test
      testPlans:
        - path: ../../Plans/macOS-Swift_Base.xctestplan
  macOS-Swift-Other:
    templates:
      - SampleAppScheme
    build:
      targets:
        macOS-Swift: all
  macOS-Swift-Sandboxed:
    templates:
      - SampleAppScheme
    build:
      targets:
        macOS-Swift: all
  macOS-Swift-Sandboxed-Other:
    templates:
      - SampleAppScheme
    build:
      targets:
        macOS-Swift: all
