# yaml-language-server: $schema=../../schema/xcodegen.schema.json
#
# This sample uses Sentry from Objective-C++ without modules (-fmodules /
# -fcxx-modules). It depends on SentryObjC, the pure ObjC wrapper that exposes
# the full SDK API via #import <SentryObjC/SentryObjC.h>.
#
# See README.md in this directory for details.

name: iOS-ObjectiveCpp-NoModules
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
packages:
  Sentry:
    path: ../..
fileGroups:
  - ../Shared/Config
  - iOS-ObjectiveCpp-NoModules.yml
options:
  bundleIdPrefix: io.sentry
targets:
  iOS-ObjectiveCpp-NoModules:
    type: application
    platform: auto
    deploymentTarget: "15.0"
    sources:
      - ../Shared/SampleAssets.xcassets
      - iOS-ObjectiveCpp-NoModules
    dependencies:
      - package: Sentry
        product: SentryObjC
    configFiles:
      Debug: iOS-ObjectiveCpp-NoModules.xcconfig
      Release: iOS-ObjectiveCpp-NoModules.xcconfig
schemes:
  iOS-ObjectiveCpp-NoModules:
    build:
      targets:
        iOS-ObjectiveCpp-NoModules: all
    run:
      config: Debug
    archive:
      config: Release
