# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: visionOS-Swift
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
packages:
  Sentry:
    path: ../..
  SentrySampleShared:
    path: ../SentrySampleShared/
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  visionOS-Swift:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: visionOS-Swift.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - package: Sentry
        products:
          - SentrySPM
      - package: SentrySampleShared
        products:
          - SentrySampleShared
          - SentrySampleUITestShared
    configFiles:
      Debug: App/Configurations/visionOS-Swift.xcconfig
      Release: App/Configurations/visionOS-Swift.xcconfig
      Test: App/Configurations/visionOS-Swift.xcconfig
      TestCI: App/Configurations/visionOS-Swift.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
schemes:
  visionOS-Swift:
    templates:
      - SampleAppScheme
    build:
      targets:
        visionOS-Swift: all
