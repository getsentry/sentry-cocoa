# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: tvOS-Swift
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  tvOS-Swift:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: tvOS-Swift.yml
        group: App/Configurations
        buildPhase: none
      - path: ../../Plans/tvOS-Swift_Base.xctestplan
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: App/Configurations/tvOS-Swift.xcconfig
      Release: App/Configurations/tvOS-Swift.xcconfig
      Test: App/Configurations/tvOS-Swift.xcconfig
      TestCI: App/Configurations/tvOS-Swift.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
  tvOS-SBSwift:
    type: application
    platform: auto
    sources:
      # Sources
      - path: AppSBSwift/Sources
        type: group
        group: AppSBSwift
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: AppSBSwift/Resources
        type: group
        group: AppSBSwift
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: AppSBSwift/Resources
      # Configurations
      - path: AppSBSwift/Configurations
        type: group
        group: AppSBSwift
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: AppSBSwift/Configurations
        buildPhase: none
      - path: ../../Plans/tvOS-SBSwift_Base.xctestplan
        group: AppSBSwift/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: AppSBSwift/Configurations/tvOS-SBSwift.xcconfig
      Release: AppSBSwift/Configurations/tvOS-SBSwift.xcconfig
      Test: AppSBSwift/Configurations/tvOS-SBSwift.xcconfig
      TestCI: AppSBSwift/Configurations/tvOS-SBSwift.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
  tvOS-Swift-UITests:
    type: bundle.ui-testing
    platform: auto
    dependencies:
      - target: SentrySampleShared/SentrySampleUITestShared
      - target: SentrySampleShared/SentrySampleShared
    sources:
      # Sources
      - path: UITests/Sources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: UITests/Configurations
        type: group
        group: UITests
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: UITests/Configurations
        buildPhase: none
    configFiles:
      Debug: UITests/Configurations/tvOS-Swift-UITests.xcconfig
      Release: UITests/Configurations/tvOS-Swift-UITests.xcconfig
      Test: UITests/Configurations/tvOS-Swift-UITests.xcconfig
      TestCI: UITests/Configurations/tvOS-Swift-UITests.xcconfig
  tvOS-SBSwift-UITests:
    type: bundle.ui-testing
    platform: auto
    dependencies:
      - target: SentrySampleShared/SentrySampleUITestShared
      - target: SentrySampleShared/SentrySampleShared
    sources:
      # Sources
      - path: AppSBSwift-UITests/Sources
        type: group
        group: AppSBSwift-UITests
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: AppSBSwift-UITests/Configurations
        type: group
        group: AppSBSwift-UITests
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: AppSBSwift-UITests/Configurations
        buildPhase: none
    configFiles:
      Debug: AppSBSwift-UITests/Configurations/tvOS-SBSwift-UITests.xcconfig
      Release: AppSBSwift-UITests/Configurations/tvOS-SBSwift-UITests.xcconfig
      Test: AppSBSwift-UITests/Configurations/tvOS-SBSwift-UITests.xcconfig
      TestCI: AppSBSwift-UITests/Configurations/tvOS-SBSwift-UITests.xcconfig
schemes:
  tvOS-Swift:
    templates:
      - SampleAppScheme
    build:
      targets:
        tvOS-Swift: all
        tvOS-Swift-UITests: test
    test:
      config: Test
      testPlans:
        - path: ../../Plans/tvOS-Swift_Base.xctestplan
  tvOS-SBSwift:
    templates:
      - SampleAppScheme
    build:
      targets:
        tvOS-Swift: all
        tvOS-Swift-UITests: test
    test:
      config: Test
      testPlans:
        - path: ../../Plans/tvOS-SBSwift_Base.xctestplan
