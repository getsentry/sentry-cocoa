# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: SessionReplay-CameraTest
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  SessionReplay-CameraTest:
    type: application
    platform: iOS
    sources:
      # Sources
      - path: Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: SessionReplay-CameraTest.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: Configurations/SessionReplay-CameraTest.xcconfig
      Release: Configurations/SessionReplay-CameraTest.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
schemes:
  SessionReplay-CameraTest:
    templates:
      - SampleAppScheme
    build:
      targets:
        SessionReplay-CameraTest: all
