# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: iOS-ObjectiveC
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  iOS-ObjectiveC:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
          - NoARCCrash.m
      - path: App/Sources/NoARCCrash.m
        group: App/Sources
        compilerFlags:
          - "-fno-objc-arc"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: iOS-ObjectiveC.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: Sentry/SentrySwiftUI
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: App/Configurations/iOS-ObjectiveC.xcconfig
      Release: App/Configurations/iOS-ObjectiveC.xcconfig
      Test: App/Configurations/iOS-ObjectiveC.xcconfig
      TestCI: App/Configurations/iOS-ObjectiveC.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
  iOS-ObjectiveC-UITests:
    type: bundle.ui-testing
    platform: auto
    dependencies:
      - target: SentrySampleShared/SentrySampleUITestShared
      - target: SentrySampleShared/SentrySampleShared
    sources:
      # Sources
      - path: UITests/Sources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: UITests/Resources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: UITests/Configurations
        type: group
        group: UITests
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: UITests/Configurations
        buildPhase: none
      - path: ../../Plans/iOS-ObjectiveC_Base.xctestplan
        group: UITests/Configurations
        buildPhase: none
    configFiles:
      Debug: UITests/Configurations/iOS-ObjectiveC-UITests.xcconfig
      Release: UITests/Configurations/iOS-ObjectiveC-UITests.xcconfig
      Test: UITests/Configurations/iOS-ObjectiveC-UITests.xcconfig
      TestCI: UITests/Configurations/iOS-ObjectiveC-UITests.xcconfig
schemes:
  iOS-ObjectiveC:
    templates:
      - SampleAppScheme
    build:
      targets:
        iOS-ObjectiveC: all
        iOS-ObjectiveC-UITests: test
    test:
      config: Test
      testPlans:
        - path: ../../Plans/iOS-ObjectiveC_Base.xctestplan
