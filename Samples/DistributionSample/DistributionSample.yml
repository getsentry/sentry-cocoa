# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: DistributionSample
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
options:
  bundleIdPrefix: io.sentry.sample.
  defaultSourceDirectoryType: syncedFolder
packages:
  Sentry:
    path: ../../
targets:
  App:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: Sentry
        products:
          - SentryDistribution
    configFiles:
      Debug: App/Configurations/DistributionSample.xcconfig
      Release: App/Configurations/DistributionSample.xcconfig
schemes:
  DistributionSample:
    templates:
      - SampleAppScheme
    build:
      targets:
        App: all
