# yaml-language-server: $schema=../../schema/xcodegen.schema.json
#
# This sample uses the pre-built SentryObjC-Dynamic xcframework from
# Package.swift. It validates that the binary target works end-to-end
# via SPM in a plain Objective-C iOS app.

name: iOS-ObjectiveC-Dynamic
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
packages:
  Sentry:
    path: ../..
options:
  bundleIdPrefix: io.sentry
targets:
  iOS-ObjectiveC-Dynamic:
    type: application
    platform: auto
    deploymentTarget: "15.0"
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: iOS-ObjectiveC-Dynamic.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - package: Sentry
        product: SentryObjC-Dynamic
    configFiles:
      Debug: App/Configurations/iOS-ObjectiveC-Dynamic.xcconfig
      Release: App/Configurations/iOS-ObjectiveC-Dynamic.xcconfig
schemes:
  iOS-ObjectiveC-Dynamic:
    build:
      targets:
        iOS-ObjectiveC-Dynamic: all
    run:
      config: Debug
    archive:
      config: Release
