# yaml-language-server: $schema=../../schema/xcodegen.schema.json
#
# This sample app demonstrates using the SentrySPM product (compile-from-source via SPM)
# instead of the pre-built xcframework binary. It uses a local package reference to the
# sentry-cocoa repo so changes to the SDK source are immediately reflected.

name: iOS-SwiftUI-SPM
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
packages:
  Sentry:
    path: ../..
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  App:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      # Sources
      - path: Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: iOS-SwiftUI-SPM.yml
        group: App/Configurations
    dependencies:
      - package: Sentry
        product: SentrySPM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.sentry.iOS-SwiftUI-SPM
        INFOPLIST_FILE: Configurations/Info.plist
        CODE_SIGN_ENTITLEMENTS: Configurations/Entitlements.entitlements
        SWIFT_VERSION: "5.0"
  WatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "8.0"
    sources:
      # Sources
      - path: Sources-watchOS
        type: group
        group: WatchApp
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: Configurations
        type: group
        group: WatchApp
        buildPhase: none
        excludes:
          - "**/.gitkeep"
    dependencies:
      - package: Sentry
        product: SentrySPM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.sentry.watchOS-SwiftUI-SPM
        SWIFT_VERSION: "5.0"
    info:
      path: Configurations/watchOS-Info.plist
      properties:
        CFBundleDisplayName: watchOS-SwiftUI-SPM
        WKApplication: true
schemes:
  iOS-SwiftUI-SPM:
    build:
      targets:
        App: all
    run:
      config: Debug
    archive:
      config: Release
  watchOS-SwiftUI-SPM:
    build:
      targets:
        WatchApp: all
    run:
      config: Debug
    archive:
      config: Release
