# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: iOS-SwiftUI-Widgets
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry.sentry-cocoa.samples
  defaultSourceDirectoryType: syncedFolder
targets:
  iOS-SwiftUI-Widgets:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
          - "**/Info.plist"
          - "**/*.entitlements"
      - path: Shared
        type: group
        group: App
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: iOS-SwiftUI-Widgets.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: SentrySampleShared/SentrySampleShared
      - target: iOS-SwiftUI-Widgets-WidgetExtension
      - target: iOS-SwiftUI-Widgets-LiveActivity
    configFiles:
      Debug: App/Configurations/iOS-SwiftUI-Widgets.xcconfig
      Release: App/Configurations/iOS-SwiftUI-Widgets.xcconfig
  iOS-SwiftUI-Widgets-WidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      # Sources
      - path: WidgetExtension/Sources
        type: group
        group: WidgetExtension
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: WidgetExtension/Resources
        type: group
        group: WidgetExtension
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: WidgetExtension/Configurations
        type: group
        group: WidgetExtension
        buildPhase: none
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: Sentry/Sentry
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: WidgetExtension/Configurations/iOS-SwiftUI-Widgets-WidgetExtension.xcconfig
      Release: WidgetExtension/Configurations/iOS-SwiftUI-Widgets-WidgetExtension.xcconfig
  iOS-SwiftUI-Widgets-LiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      # Sources
      - path: LiveActivity/Sources
        type: group
        group: LiveActivity
        excludes:
          - "**/.gitkeep"
      - path: Shared/Data
        type: group
        group: LiveActivity
      # Resources
      - path: LiveActivity/Resources
        type: group
        group: LiveActivity
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: LiveActivity/Configurations
        type: group
        group: LiveActivity
        buildPhase: none
        excludes:
          - "**/.gitkeep"
    dependencies:
      - target: Sentry/Sentry
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: LiveActivity/Configurations/iOS-SwiftUI-Widgets-LiveActivity.xcconfig
      Release: LiveActivity/Configurations/iOS-SwiftUI-Widgets-LiveActivity.xcconfig
schemes:
  iOS-SwiftUI-Widgets:
    build:
      targets:
        iOS-SwiftUI-Widgets: all
        iOS-SwiftUI-Widgets-WidgetExtension: all
        iOS-SwiftUI-Widgets-LiveActivity: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  iOS-SwiftUI-Widgets-WidgetExtension:
    build:
      targets:
        iOS-SwiftUI-Widgets: all
        iOS-SwiftUI-Widgets-WidgetExtension: all
    run:
      config: Debug
      askForAppToLaunch: true
      environmentVariables:
        _XCWidgetKind: SampleWidget
  iOS-SwiftUI-Widgets-WidgetControl:
    build:
      targets:
        iOS-SwiftUI-Widgets: all
        iOS-SwiftUI-Widgets-WidgetExtension: all
    run:
      config: Debug
      askForAppToLaunch: true
      environmentVariables:
        _XCWidgetKind: SampleWidgetControl
  iOS-SwiftUI-Widgets-LiveActivity:
    build:
      targets:
        iOS-SwiftUI-Widgets: all
        iOS-SwiftUI-Widgets-WidgetExtension: all
        iOS-SwiftUI-Widgets-LiveActivity: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
