parent_config: ../.swiftlint.yml

custom_rules:
  no_bare_xctassert:
    name: "No bare XCTAssert"
    regex: 'XCTAssert\('
    message: "Use XCTAssertTrue, XCTAssertEqual, XCTAssertIdentical, etc. instead of bare XCTAssert(). Specific assertions provide better failure messages."
    severity: error

disabled_rules:
  - force_cast
  - force_try
  - force_unwrapping
  - identifier_name
  - missing_docs
  - object_literal
  - private_outlet
  - unused_optional_binding

  # This rule allows UIViewControllers to have only 250 lines of code. The argument is that you should
  # extract business logic into extra classes. We deliberately turn this off because the extra classes
  # could make our samples harder to read, and our business logic is simple.
  - type_body_length
