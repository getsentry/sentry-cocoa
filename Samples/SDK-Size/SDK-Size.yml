# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: SDK-Size
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  SDK-Size:
    type: application
    platform: auto
    sources:
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: SDK-Size.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
    configFiles:
      Debug: App/Configurations/SDK-Size.xcconfig
      Release: App/Configurations/SDK-Size.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
schemes:
  SDK-Size:
    templates:
      - SampleAppScheme
    build:
      targets:
        SDK-Size: all
