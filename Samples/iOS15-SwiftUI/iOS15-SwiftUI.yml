# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: iOS15-SwiftUI
include:
  - ../Shared/feature-flags.yml
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
  SentrySampleShared:
    path: ../SentrySampleShared/SentrySampleShared.xcodeproj
options:
  bundleIdPrefix: io.sentry
  defaultSourceDirectoryType: syncedFolder
targets:
  iOS15-SwiftUI:
    type: application
    platform: auto
    sources:
      # Sources
      - path: Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Resources
      - path: Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/SampleAssets.xcassets
        group: App/Resources
      # Configurations
      - path: Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: ../Shared/Config
        type: group
        group: App/Configurations
        buildPhase: none
      - path: iOS15-SwiftUI.yml
        group: App/Configurations
        buildPhase: none
    dependencies:
      - target: Sentry/Sentry
      - target: SentrySampleShared/SentrySampleShared
    configFiles:
      Debug: Configurations/iOS15-SwiftUI.xcconfig
      Release: Configurations/iOS15-SwiftUI.xcconfig
      Test: Configurations/iOS15-SwiftUI.xcconfig
      TestCI: Configurations/iOS15-SwiftUI.xcconfig
    postCompileScripts:
      - script: ../Shared/inject-git-info.sh
        name: Inject Git Information into Info.plist
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - script: ../Shared/reset-git-info.sh
        name: Reset Git Fields in Info.plist
        basedOnDependencyAnalysis: false
schemes:
  iOS15-SwiftUI:
    templates:
      - SampleAppScheme
    build:
      targets:
        iOS15-SwiftUI: all
