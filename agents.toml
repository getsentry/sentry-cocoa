version = 1
# Managed skills are gitignored; collaborators must run 'dotagents install'.
gitignore = true
agents = ["claude", "cursor"]

[[skills]]
name = "*"
source = "getsentry/dotagents"

[[mcp]]
name = "XcodeBuildMCP"
command = "npx"
args = ["-y", "xcodebuildmcp@2.0.7", "mcp"]

[[mcp]]
name = "sentry"
url = "https://mcp.sentry.dev/mcp/sentry-sdks/sentry-cocoa"
