# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: SwiftUITestSample
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Test: debug
  TestCI: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
options:
  bundleIdPrefix: io.sentry
targets:
  SwiftUITestSample:
    type: application
    platform: auto
    dependencies:
      - target: Sentry/Sentry
    sources:
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: SwiftUITestSample.yml
        group: App/Configurations
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
    settings:
      SWIFT_OBJC_BRIDGING_HEADER: App/Headers/SwiftUITestSample-Bridging-Header.h
    configFiles:
      Debug: App/Configurations/SwiftUITestSample.xcconfig
      Release: App/Configurations/SwiftUITestSample.xcconfig
      Test: App/Configurations/SwiftUITestSample.xcconfig
      TestCI: App/Configurations/SwiftUITestSample.xcconfig
  SwiftUITestSampleUITests:
    type: bundle.ui-testing
    platform: auto
    sources:
      # Configurations
      - path: UITests/Configurations
        type: group
        group: UITests
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      # Sources
      - path: UITests/Sources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
    configFiles:
      Debug: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
      Release: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
      Test: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
      TestCI: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
  SwiftUITestSampleUITestsEnvelopeOnly:
    type: bundle.ui-testing
    platform: auto
    sources:
      # Configurations
      - path: UITests/Configurations
        type: group
        group: UITests
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      # Sources
      - path: UITests/Sources
        type: group
        group: UITests
        excludes:
          - "**/.gitkeep"
    configFiles:
      Debug: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
      Release: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
      Test: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
      TestCI: UITests/Configurations/SwiftUITestSampleUITests.xcconfig
schemes:
  SwiftUITestSampleEnvelope:
    build:
      targets:
        SwiftUITestSample: all
        SwiftUITestSampleUITestsEnvelopeOnly: test
    test:
      config: Test
      testPlans:
        - path: ../../Plans/SwiftUITestSample_Envelope.xctestplan
      preActions:
        - script: |
            echo "Uninstalling app"
            xcrun simctl uninstall booted io.sentry.tests.SwiftUITestSample
  SwiftUITestSampleAll:
    build:
      targets:
        SwiftUITestSample: all
        SwiftUITestSampleUITests: test
    test:
      config: Test
      testPlans:
        - path: ../../Plans/SwiftUITestSample_Base.xctestplan
