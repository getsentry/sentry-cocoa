# yaml-language-server: $schema=../../schema/xcodegen.schema.json

name: SwiftUICrashTest
createIntermediateGroups: true
generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
projectReferences:
  Sentry:
    path: ../../Sentry.xcodeproj
options:
  bundleIdPrefix: io.sentry
targets:
  SwiftUICrashTest:
    type: application
    platform: auto
    dependencies:
      - target: Sentry/Sentry
    sources:
      # Configurations
      - path: App/Configurations
        type: group
        group: App
        buildPhase: none
        excludes:
          - "**/.gitkeep"
      - path: SwiftUICrashTest.yml
        group: App/Configurations
      # Resources
      - path: App/Resources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
      # Sources
      - path: App/Sources
        type: group
        group: App
        excludes:
          - "**/.gitkeep"
    configFiles:
      Debug: App/Configurations/SwiftUICrashTest.xcconfig
      Release: App/Configurations/SwiftUICrashTest.xcconfig

schemes:
  SwiftUICrashTest:
    build:
      targets:
        SwiftUICrashTest: all
